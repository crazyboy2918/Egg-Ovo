
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { display: flex; height: 580px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
.sidebar { width: 190px; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; background: var(--color-background-secondary); flex-shrink: 0; }
.sidebar-header { padding: 14px 14px 10px; }
.brand { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.brand-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
.cat-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.cat-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); border-left: 2px solid transparent; }
.cat-item:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.cat-item.active { background: var(--color-background-primary); color: var(--color-text-primary); border-left-color: #2D6A4F; font-weight: 500; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-count { margin-left: auto; font-size: 11px; color: var(--color-text-tertiary); }
.note-list { width: 200px; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; flex-shrink: 0; }
.list-header { padding: 12px 12px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; }
.list-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.add-btn { width: 22px; height: 22px; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; font-size: 16px; color: var(--color-text-secondary); line-height: 1; display: flex; align-items: center; justify-content: center; }
.add-btn:hover { background: var(--color-background-secondary); }
.note-items { flex: 1; overflow-y: auto; }
.note-card { padding: 10px 12px; cursor: pointer; border-bottom: 0.5px solid var(--color-border-tertiary); }
.note-card:hover { background: var(--color-background-secondary); }
.note-card.active { background: var(--color-background-info); }
.note-card-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-card.active .note-card-title { color: var(--color-text-info); }
.note-card-preview { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-card-date { font-size: 10px; color: var(--color-text-tertiary); margin-top: 3px; }
.editor-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Toolbar */
.editor-top { padding: 10px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 8px; }
.title-input { flex: 1; border: none; outline: none; font-size: 15px; font-weight: 500; color: var(--color-text-primary); background: transparent; font-family: var(--font-sans); }
.title-input::placeholder { color: var(--color-text-tertiary); }
.cat-select { padding: 3px 6px; border-radius: 6px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-sans); outline: none; cursor: pointer; }
.delete-btn { padding: 3px 8px; border-radius: 6px; border: 0.5px solid var(--color-border-tertiary); background: transparent; cursor: pointer; font-size: 11px; color: var(--color-text-tertiary); }
.delete-btn:hover { border-color: #E24B4A; color: #E24B4A; background: #FCEBEB; }

/* Format toolbar */
.fmt-bar { padding: 6px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; background: var(--color-background-secondary); }
.fmt-group { display: flex; align-items: center; gap: 2px; }
.fmt-sep { width: 1px; height: 18px; background: var(--color-border-tertiary); margin: 0 4px; }
.fmt-btn { width: 26px; height: 26px; border-radius: 5px; border: 0.5px solid transparent; background: transparent; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center; font-family: var(--font-sans); transition: all 0.1s; }
.fmt-btn:hover { background: var(--color-background-primary); border-color: var(--color-border-tertiary); color: var(--color-text-primary); }
.fmt-btn.active { background: var(--color-background-primary); border-color: var(--color-border-secondary); color: var(--color-text-primary); }
.size-select { height: 26px; padding: 0 4px; border-radius: 5px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-sans); outline: none; cursor: pointer; }
.color-label { font-size: 11px; color: var(--color-text-tertiary); padding: 0 2px; }
.color-swatch { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--color-border-secondary); cursor: pointer; flex-shrink: 0; position: relative; }
.color-swatch.selected { border-color: var(--color-text-primary); border-width: 2px; }
.color-picker-wrap { position: relative; display: flex; align-items: center; }
#customColorInput { position: absolute; opacity: 0; width: 22px; height: 22px; cursor: pointer; left: 0; top: 0; }
.custom-swatch { width: 22px; height: 22px; border-radius: 4px; border: 1.5px dashed var(--color-border-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: var(--color-text-tertiary); overflow: hidden; }

/* Editor body */
.editor-body { flex: 1; overflow-y: auto; padding: 16px; }
.editor-content { min-height: 100%; outline: none; font-size: 13px; color: var(--color-text-primary); line-height: 1.8; caret-color: var(--color-text-primary); white-space: pre-wrap; word-break: break-word; }
.editor-content:empty:before { content: attr(data-placeholder); color: var(--color-text-tertiary); pointer-events: none; }

.status-bar { padding: 6px 14px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 12px; }
.status-text { font-size: 11px; color: var(--color-text-tertiary); }
.save-indicator { font-size: 11px; color: #2D6A4F; opacity: 0; transition: opacity 0.3s; }
.save-indicator.show { opacity: 1; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.empty-icon { font-size: 32px; opacity: 0.3; }
.empty-text { font-size: 13px; color: var(--color-text-tertiary); }
</style>

<h2 class="sr-only">Egg Ovo 노트 앱 — 서식 지원 에디터</h2>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">🥚 Egg Ovo</div>
      <div class="brand-sub">Min's Notebook</div>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>
  <div class="note-list">
    <div class="list-header">
      <span class="list-title" id="listTitle">전체</span>
      <button class="add-btn" onclick="addNote()">+</button>
    </div>
    <div class="note-items" id="noteItems"></div>
  </div>
  <div class="editor-area" id="editorArea">
    <div class="empty-state">
      <div class="empty-icon">📝</div>
      <div class="empty-text">노트를 선택하거나 새로 만들어보세요</div>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id: 'all', label: '전체', color: '#888' },
  { id: 'recipe', label: '레시피', color: '#2D6A4F' },
  { id: 'idea', label: '아이디어', color: '#185FA5' },
  { id: 'plan', label: '사업 계획', color: '#BA7517' },
  { id: 'ops', label: '운영 메모', color: '#993556' },
  { id: 'memo', label: '기타', color: '#5F5E5A' },
];

const COLORS = [
  { hex: '#1a1a1a', label: '검정' },
  { hex: '#E24B4A', label: '빨강' },
  { hex: '#185FA5', label: '파랑' },
  { hex: '#2D6A4F', label: '초록' },
  { hex: '#BA7517', label: '주황' },
  { hex: '#993556', label: '분홍' },
  { hex: '#888780', label: '회색' },
];

const SIZES = [
  { val: '11px', label: '소' },
  { val: '13px', label: '중' },
  { val: '16px', label: '대' },
  { val: '20px', label: '특대' },
];

const SAMPLE = [
  { id: 1, cat: 'recipe', title: '유자 아이올리 소스', body: '<div>재료:<br>- 키피 마요네즈 3큰술<br>- 유자 마멀레이드 1큰술<br>- 다진 마늘 1/2작은술<br>- 레몬즙 1작은술<br><br>만드는 법:<br>1. 모든 재료를 볼에 넣고 잘 섞는다<br>2. 냉장고에서 30분 숙성 후 사용</div>', date: '2025-04-20' },
  { id: 2, cat: 'plan', title: '1호점 오픈 체크리스트', body: '<div>사전 준비:<br>□ LLC 법인 설립 완료<br>□ EIN 발급<br>□ 조지아 영업 허가<br>□ Square 키오스크 설치</div>', date: '2025-04-18' },
  { id: 3, cat: 'idea', title: '시그니처 메뉴 아이디어', body: '<div>1. Classic Egg Ovo — 유자 아이올리 + 루꼴라<br>2. Spicy Seoul — 스리라차 마요 + 김치<br>3. Truffle Gold — 트러플 오일 + 그뤼에르</div>', date: '2025-04-15' },
];

let notes = [];
try { notes = JSON.parse(localStorage.getItem('eggovo_notes_v2') || 'null') || SAMPLE; } catch(e) { notes = SAMPLE; }
let nextId = Math.max(...notes.map(n => n.id), 0) + 1;
let activeCat = 'all';
let activeNote = null;
let saveTimer = null;
let customColor = '#7c3aed';

function saveAll() {
  if (activeNote) {
    const el = document.getElementById('editorContent');
    if (el) activeNote.body = el.innerHTML;
  }
  try { localStorage.setItem('eggovo_notes_v2', JSON.stringify(notes)); } catch(e) {}
}

function fmt(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function getFiltered() {
  return activeCat === 'all' ? [...notes] : notes.filter(n => n.cat === activeCat);
}

function plainText(html) {
  const d = document.createElement('div'); d.innerHTML = html; return d.textContent || '';
}

function renderCats() {
  document.getElementById('catList').innerHTML = CATS.map(c => {
    const count = c.id === 'all' ? notes.length : notes.filter(n => n.cat === c.id).length;
    return `<div class="cat-item${activeCat===c.id?' active':''}" onclick="selectCat('${c.id}')">
      <div class="cat-dot" style="background:${c.color}"></div>
      <span>${c.label}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join('');
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('listTitle').textContent = CATS.find(c=>c.id===activeCat)?.label||'전체';
  const el = document.getElementById('noteItems');
  if (!filtered.length) { el.innerHTML = `<div style="padding:20px 12px;text-align:center;font-size:12px;color:var(--color-text-tertiary)">노트가 없습니다</div>`; return; }
  el.innerHTML = filtered.map(n => {
    const preview = plainText(n.body||'').slice(0,40)||'내용 없음';
    return `<div class="note-card${activeNote?.id===n.id?' active':''}" onclick="selectNote(${n.id})">
      <div class="note-card-title">${n.title||'제목 없음'}</div>
      <div class="note-card-preview">${preview}</div>
      <div class="note-card-date">${fmt(n.date)}</div>
    </div>`;
  }).join('');
}

function buildFmtBar() {
  const colorSwatches = COLORS.map((c,i) =>
    `<div class="color-swatch${i===0?' selected':''}" style="background:${c.hex}" title="${c.label}" onclick="applyColor('${c.hex}', this)"></div>`
  ).join('');

  return `<div class="fmt-bar" id="fmtBar">
    <div class="fmt-group">
      <button class="fmt-btn" id="btnB" title="굵게" onclick="execFmt('bold')" style="font-weight:700">B</button>
      <button class="fmt-btn" id="btnI" title="기울임" onclick="execFmt('italic')" style="font-style:italic">I</button>
      <button class="fmt-btn" id="btnU" title="밑줄" onclick="execFmt('underline')" style="text-decoration:underline">U</button>
      <button class="fmt-btn" id="btnS" title="취소선" onclick="execFmt('strikeThrough')" style="text-decoration:line-through">S</button>
    </div>
    <div class="fmt-sep"></div>
    <div class="fmt-group">
      <select class="size-select" id="sizeSelect" onchange="applySize(this.value)" title="글씨 크기">
        ${SIZES.map(s=>`<option value="${s.val}"${s.val==='13px'?' selected':''}>${s.label}</option>`).join('')}
      </select>
    </div>
    <div class="fmt-sep"></div>
    <span class="color-label">색상</span>
    <div class="fmt-group" id="colorSwatches">${colorSwatches}</div>
    <div class="color-picker-wrap" title="직접 선택">
      <div class="custom-swatch" id="customSwatch" style="background:${customColor}"></div>
      <input type="color" id="customColorInput" value="${customColor}" onchange="applyCustomColor(this.value)">
    </div>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" title="전체 서식 제거" onclick="execFmt('removeFormat')" style="font-size:10px">지우기</button>
  </div>`;
}

function renderEditor() {
  const ea = document.getElementById('editorArea');
  if (!activeNote) {
    ea.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">노트를 선택하거나 새로 만들어보세요</div></div>`;
    return;
  }
  const catOpts = CATS.filter(c=>c.id!=='all').map(c=>`<option value="${c.id}"${activeNote.cat===c.id?' selected':''}>${c.label}</option>`).join('');
  ea.innerHTML = `
    <div class="editor-top">
      <input class="title-input" id="titleInput" placeholder="제목" value="${activeNote.title||''}" oninput="updateTitle(this.value)">
      <select class="cat-select" onchange="updateCat(this.value)">${catOpts}</select>
      <button class="delete-btn" onclick="deleteNote()">삭제</button>
    </div>
    ${buildFmtBar()}
    <div class="editor-body">
      <div class="editor-content" id="editorContent" contenteditable="true" data-placeholder="내용을 입력하세요...">${activeNote.body||''}</div>
    </div>
    <div class="status-bar">
      <span class="status-text" id="charCount">${plainText(activeNote.body||'').replace(/\s/g,'').length}자</span>
      <span class="save-indicator" id="saveInd">저장됨</span>
    </div>`;

  const content = document.getElementById('editorContent');
  content.addEventListener('input', () => {
    activeNote.body = content.innerHTML;
    const cc = document.getElementById('charCount');
    if (cc) cc.textContent = plainText(content.innerHTML).replace(/\s/g,'').length + '자';
    scheduleSave();
  });
  content.addEventListener('keyup', updateFmtState);
  content.addEventListener('mouseup', updateFmtState);
  content.addEventListener('keydown', e => {
    if (e.key === 'Enter') { document.execCommand('insertLineBreak'); e.preventDefault(); }
  });
}

function execFmt(cmd) {
  document.getElementById('editorContent')?.focus();
  document.execCommand(cmd, false, null);
  updateFmtState();
}

function applySize(size) {
  const el = document.getElementById('editorContent');
  if (!el) return;
  el.focus();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  document.execCommand('fontSize', false, '7');
  el.querySelectorAll('font[size="7"]').forEach(f => {
    f.removeAttribute('size');
    f.style.fontSize = size;
  });
  scheduleSave();
}

function applyColor(hex, el) {
  document.getElementById('editorContent')?.focus();
  document.execCommand('foreColor', false, hex);
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  if (el) el.classList.add('selected');
  scheduleSave();
}

function applyCustomColor(hex) {
  customColor = hex;
  document.getElementById('customSwatch').style.background = hex;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  applyColor(hex, null);
}

function updateFmtState() {
  ['bold','italic','underline','strikeThrough'].forEach(cmd => {
    const map = {bold:'btnB',italic:'btnI',underline:'btnU',strikeThrough:'btnS'};
    const btn = document.getElementById(map[cmd]);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { saveAll(); showSaved(); renderCats(); renderList(); }, 800);
}

function showSaved() {
  const ind = document.getElementById('saveInd');
  if (!ind) return;
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 1500);
}

function updateTitle(v) { if (activeNote) { activeNote.title = v; scheduleSave(); } }
function updateCat(v) { if (activeNote) { activeNote.cat = v; scheduleSave(); renderCats(); renderList(); } }

function selectCat(id) { activeCat = id; activeNote = null; renderCats(); renderList(); renderEditor(); }

function selectNote(id) {
  if (activeNote) { const el = document.getElementById('editorContent'); if (el) activeNote.body = el.innerHTML; }
  activeNote = notes.find(n => n.id === id);
  renderList(); renderEditor();
}

function addNote() {
  const cat = activeCat === 'all' ? 'memo' : activeCat;
  const n = { id: nextId++, cat, title: '', body: '', date: new Date().toISOString().slice(0,10) };
  notes.unshift(n);
  activeNote = n;
  saveAll(); renderCats(); renderList(); renderEditor();
  setTimeout(() => document.getElementById('titleInput')?.focus(), 50);
}

function deleteNote() {
  if (!activeNote || !confirm('이 노트를 삭제할까요?')) return;
  notes = notes.filter(n => n.id !== activeNote.id);
  activeNote = null;
  saveAll(); renderCats(); renderList(); renderEditor();
}

renderCats(); renderList(); renderEditor();
</script>
