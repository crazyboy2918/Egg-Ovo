<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egg Ovo Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #2D6A4F;
    --green-dark: #1e4d38;
    --green-light: #e8f5f0;
    --gold: #B8860B;
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e5e3de;
    --border-mid: #d0cdc6;
    --text: #1a1915;
    --text-muted: #7a7870;
    --text-faint: #b0aea8;
    --red: #c0392b;
    --red-bg: #fdf0ef;
    --orange-bg: #fef8ec;
    --orange: #BA7517;
    --sidebar-w: 190px;
    --list-w: 210px;
  }
  html, body { height: 100%; font-family: 'Georgia', serif; background: var(--bg); color: var(--text); }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: var(--sidebar-w); background: var(--green); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
  .note-list { width: var(--list-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .editor-area { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--surface); }

  /* Sidebar */
  .sidebar-brand { padding: 22px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .brand-sub { text-align: center; }
  .brand-name { font-size: 16px; font-weight: 600; letter-spacing: 0.12em; color: #fff; font-family: 'Montserrat', sans-serif; text-transform: uppercase; }
  .brand-sub { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 3px; font-family: 'Helvetica Neue', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
  .cat-list { flex: 1; padding: 10px 0; overflow-y: auto; }
  .cat-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.7); font-family: 'Helvetica Neue', sans-serif; border-left: 3px solid transparent; transition: all 0.15s; user-select: none; }
  .cat-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .cat-item.active { background: rgba(255,255,255,0.15); color: #fff; border-left-color: #FFD700; }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cat-count { margin-left: auto; font-size: 11px; background: rgba(255,255,255,0.15); padding: 1px 7px; border-radius: 10px; }
  .sidebar-footer { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.15); }
  .auth-status { font-size: 11px; color: rgba(255,255,255,0.55); font-family: 'Helvetica Neue', sans-serif; }
  .auth-email { color: rgba(255,255,255,0.8); font-size: 11px; font-family: 'Helvetica Neue', sans-serif; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .auth-btn { margin-top: 8px; width: 100%; padding: 6px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.8); border-radius: 5px; font-size: 12px; cursor: pointer; font-family: 'Helvetica Neue', sans-serif; transition: all 0.15s; }
  .auth-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* Note list */
  .list-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .list-title { font-size: 13px; font-weight: normal; color: var(--text-muted); font-family: 'Helvetica Neue', sans-serif; text-transform: uppercase; letter-spacing: 0.06em; }
  .add-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border-mid); background: transparent; cursor: pointer; font-size: 18px; color: var(--green); line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .add-btn:hover { background: var(--green-light); border-color: var(--green); }
  .note-items { flex: 1; overflow-y: auto; }
  .note-card { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border); position: relative; transition: background 0.1s; }
  .note-card:hover { background: var(--bg); }
  .note-card.active { background: var(--green-light); border-left: 3px solid var(--green); }
  .note-card-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 14px; font-family: 'Helvetica Neue', sans-serif; font-weight: 500; }
  .note-card.active .note-card-title { color: var(--green-dark); }
  .note-card-preview { font-size: 11px; color: var(--text-faint); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Helvetica Neue', sans-serif; }
  .note-card-date { font-size: 10px; color: var(--text-faint); margin-top: 4px; font-family: 'Helvetica Neue', sans-serif; }
  .unsaved-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); position: absolute; top: 12px; right: 10px; display: none; }
  .note-card.unsaved .unsaved-dot { display: block; }

  /* Editor top */
  .editor-top { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .title-input { flex: 1; border: none; outline: none; font-size: 16px; color: var(--text); background: transparent; font-family: 'Georgia', serif; min-width: 0; }
  .title-input::placeholder { color: var(--text-faint); }
  .cat-select { padding: 4px 6px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); font-size: 11px; color: var(--text-muted); font-family: 'Helvetica Neue', sans-serif; outline: none; cursor: pointer; flex-shrink: 0; }
  .delete-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 11px; color: var(--text-faint); font-family: 'Helvetica Neue', sans-serif; transition: all 0.15s; flex-shrink: 0; }
  .delete-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* Format bar */
  .fmt-bar { padding: 5px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 4px; background: var(--bg); flex-wrap: wrap; }
  .fmt-group { display: flex; align-items: center; gap: 1px; }
  .fmt-sep { width: 1px; height: 16px; background: var(--border-mid); margin: 0 4px; flex-shrink: 0; }
  .fmt-btn { width: 26px; height: 26px; border-radius: 4px; border: 1px solid transparent; background: transparent; cursor: pointer; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-family: 'Helvetica Neue', sans-serif; transition: all 0.1s; }
  .fmt-btn:hover { background: var(--surface); border-color: var(--border); color: var(--text); }
  .fmt-btn.active { background: var(--surface); border-color: var(--border-mid); color: var(--text); }
  .size-select { height: 26px; padding: 0 4px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); font-size: 11px; color: var(--text-muted); font-family: 'Helvetica Neue', sans-serif; outline: none; cursor: pointer; }
  .font-select { height: 26px; padding: 0 4px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); font-size: 11px; color: var(--text-muted); font-family: 'Helvetica Neue', sans-serif; outline: none; cursor: pointer; max-width: 80px; }
  .color-label { font-size: 11px; color: var(--text-faint); flex-shrink: 0; font-family: 'Helvetica Neue', sans-serif; }
  .color-swatch { width: 17px; height: 17px; border-radius: 3px; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: border-color 0.1s; }
  .color-swatch.selected { border-color: var(--text); }
  .color-picker-wrap { position: relative; display: flex; align-items: center; }
  #customColorInput { position: absolute; opacity: 0; width: 22px; height: 22px; cursor: pointer; left: 0; top: 0; }
  .custom-swatch { width: 22px; height: 22px; border-radius: 4px; border: 1.5px dashed var(--border-mid); cursor: pointer; overflow: hidden; }

  /* Editor body */
  .editor-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .editor-content { min-height: 100%; outline: none; font-size: 14px; color: var(--text); line-height: 1.9; caret-color: var(--green); word-break: break-word; font-family: 'Georgia', serif; }
  .editor-content:empty:before { content: attr(data-placeholder); color: var(--text-faint); pointer-events: none; font-style: italic; }

  /* Status bar */
  .status-bar { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg); }
  .status-left { display: flex; align-items: center; gap: 8px; flex: 1; }
  .char-count { font-size: 11px; color: var(--text-faint); font-family: 'Helvetica Neue', sans-serif; }
  .unsaved-badge { font-size: 11px; color: var(--orange); background: var(--orange-bg); border-radius: 4px; padding: 1px 8px; display: none; font-family: 'Helvetica Neue', sans-serif; }
  .unsaved-badge.show { display: inline-block; }
  .save-ok { font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.4s; font-family: 'Helvetica Neue', sans-serif; }
  .save-ok.show { opacity: 1; }
  .save-btn { padding: 6px 18px; border-radius: 6px; border: none; background: var(--green); color: #fff; font-size: 12px; font-family: 'Helvetica Neue', sans-serif; cursor: pointer; font-weight: 500; flex-shrink: 0; transition: background 0.15s, opacity 0.15s; letter-spacing: 0.02em; }
  .save-btn:hover { background: var(--green-dark); }
  .save-btn:disabled { opacity: 0.35; cursor: default; }

  /* Empty / loading states */

  /* Share panel */
  .share-btn { margin-top: 6px; width: 100%; padding: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border-radius: 5px; font-size: 12px; cursor: pointer; font-family: 'Helvetica Neue', sans-serif; transition: all 0.15s; }
  .share-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .share-panel { background: rgba(0,0,0,0.3); border-radius: 6px; padding: 10px; margin-top: 8px; display: none; }
  .share-panel.open { display: block; }
  .share-panel input { width: 100%; padding: 5px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 11px; font-family: 'Helvetica Neue', sans-serif; outline: none; margin-bottom: 6px; }
  .share-panel input::placeholder { color: rgba(255,255,255,0.35); }
  .share-panel .add-share-btn { width: 100%; padding: 5px; background: #2D6A4F; border: none; color: #fff; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: 'Helvetica Neue', sans-serif; }
  .share-panel .add-share-btn:hover { background: #1e4d38; }
  .share-list { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .share-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.07); border-radius: 4px; padding: 4px 7px; }
  .share-item-email { font-size: 10px; color: rgba(255,255,255,0.7); font-family: 'Helvetica Neue', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  .share-item-remove { background: none; border: none; color: rgba(255,255,255,0.35); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px; }
  .share-item-remove:hover { color: #E24B4A; }
  .share-label { font-size: 10px; color: rgba(255,255,255,0.45); font-family: 'Helvetica Neue', sans-serif; margin-bottom: 4px; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-faint); font-family: 'Helvetica Neue', sans-serif; }
  .empty-icon { font-size: 36px; opacity: 0.4; }
  .empty-text { font-size: 13px; }
  .loading-overlay { position: fixed; inset: 0; background: rgba(247,246,243,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; font-family: 'Helvetica Neue', sans-serif; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 12px; font-family: 'Helvetica Neue', sans-serif; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .login-title { font-size: 15px; color: var(--text-muted); font-family: 'Helvetica Neue', sans-serif; }
  .login-btn { padding: 10px 24px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Helvetica Neue', sans-serif; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
  .login-btn:hover { background: var(--green-dark); }
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInAnonymously }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, orderBy, arrayUnion, arrayRemove }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBT0ugxkLlvMhp3YkoZVgO5JnP_S8mbxXU",
  authDomain: "egg-ovo.firebaseapp.com",
  projectId: "egg-ovo",
  storageBucket: "egg-ovo.firebasestorage.app",
  messagingSenderId: "57641311993",
  appId: "1:57641311993:web:234479e4bf4e6ce4f48c28",
  measurementId: "G-ZFY9ZRKBC4"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ── Constants ── */
const CATS = [
  { id:'all',    label:'전체',    color:'rgba(255,255,255,0.6)' },
  { id:'recipe', label:'레시피',  color:'#52b788' },
  { id:'idea',   label:'아이디어', color:'#74b3ce' },
  { id:'plan',   label:'사업 계획', color:'#f4a261' },
  { id:'ops',    label:'운영 메모', color:'#e07a9b' },
  { id:'memo',   label:'기타',    color:'#adb5bd' },
];
const COLORS = ['#1a1915','#c0392b','#185FA5','#2D6A4F','#BA7517','#993556','#7a7870'];
const SIZES  = [{v:'11px',l:'소'},{v:'14px',l:'중'},{v:'17px',l:'대'},{v:'22px',l:'특대'}];
const FONTS  = [
  {v:'Georgia, serif', l:'Georgia'},
  {v:"'Helvetica Neue', sans-serif", l:'Helvetica'},
  {v:"'Courier New', monospace", l:'Courier'},
  {v:"Arial, sans-serif", l:'Arial'},
  {v:"'Times New Roman', serif", l:'Times'},
  {v:"Verdana, sans-serif", l:'Verdana'},
];

/* ── State ── */
let notes      = [];
let activeCat  = 'all';
let activeNote = null;
let isDirty    = false;
let currentUser = null;
let customColor = '#7c3aed';
let nextId     = Date.now();

/* ── Toast ── */
function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

/* ── Loading ── */
function setLoading(on) {
  document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
}

/* ── Anonymous Auth + Password System ── */
signInAnonymously(auth).then(cred => {
  currentUser = cred.user;
}).catch(e => console.log('auth error:', e));

// Called after password is entered correctly
window._initNotesApp = async function() {
  currentUser = await new Promise(resolve => {
    const unsub = auth.onAuthStateChanged(user => {
      if (user) { unsub(); resolve(user); }
    });
  });
  const loginScreen = document.getElementById('loginScreen');
  if (loginScreen) loginScreen.style.display = 'none';
  const statusEl = document.getElementById('authStatus');
  const emailEl = document.getElementById('authEmail');
  if (statusEl) statusEl.textContent = '접속됨';
  if (emailEl) emailEl.textContent = 'Egg Ovo';
  setLoading(true);
  await loadNotes();
};

/* ── Shared owner resolution ── */
let _ownerUid = null; // the UID whose data we're reading

async function resolveOwner() {
  // Check if current user is a shared viewer of someone else's notes
  const myEmail = currentUser.email;
  if (!myEmail) { _ownerUid = currentUser.uid; return; } // 익명 로그인 등 이메일 없는 경우
  const emailKey = myEmail.replace(/\./g, '_');
  const refDoc = doc(db, 'sharedWith', emailKey);
  const snap = await getDoc(refDoc);
  if (snap.exists()) {
    const owners = snap.data().owners || [];
    if (owners.length && owners[0] !== currentUser.uid) {
      _ownerUid = owners[0]; // use first owner's data
      showToast('공유된 데이터로 접속 중...');
      return;
    }
  }
  _ownerUid = currentUser.uid;
}

function ownerUid() { return _ownerUid || currentUser.uid; }

function userCol() {
  const uid = window._forcedOwnerUid || ownerUid();
  return collection(db, 'users', uid, 'notes');
}

/* ── Share management ── */
window.toggleSharePanel = () => {
  document.getElementById('sharePanel').classList.toggle('open');
};

async function renderShareList() {
  const listEl = document.getElementById('shareList');
  if (!listEl) return;
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid, 'profile', 'shares'));
    const emails = snap.exists() ? (snap.data().emails || []) : [];
    listEl.innerHTML = emails.length
      ? emails.map(e => `<div class="share-item">
          <span class="share-item-email" title="${e}">${e}</span>
          <button class="share-item-remove" onclick="removeSharedUser('${e}')" title="제거">×</button>
        </div>`).join('')
      : '<div class="share-label" style="text-align:center;margin-top:4px">공유된 사람 없음</div>';
  } catch(e) {}
}

window.addSharedUser = async () => {
  const input = document.getElementById('shareEmailInput');
  const email = (input?.value || '').trim().toLowerCase();
  if (!email || !email.includes('@')) { showToast('올바른 이메일을 입력하세요'); return; }
  if (email === currentUser.email) { showToast('본인 이메일은 추가할 수 없어요'); return; }
  try {
    // Add to my shares list
    await setDoc(doc(db, 'users', currentUser.uid, 'profile', 'shares'),
      { emails: arrayUnion(email) }, { merge: true });
    // Add reverse index so they can find my UID
    const emailKey = email.replace(/\./g, '_');
    await setDoc(doc(db, 'sharedWith', emailKey),
      { owners: arrayUnion(currentUser.uid) }, { merge: true });
    if (input) input.value = '';
    await renderShareList();
    showToast('✓ ' + email + ' 에게 공유됐어요');
  } catch(e) { showToast('공유 실패: ' + e.message); }
};

window.removeSharedUser = async (email) => {
  if (!confirm(email + ' 의 공유를 취소할까요?')) return;
  try {
    await setDoc(doc(db, 'users', currentUser.uid, 'profile', 'shares'),
      { emails: arrayRemove(email) }, { merge: true });
    const emailKey = email.replace(/\./g, '_');
    await setDoc(doc(db, 'sharedWith', emailKey),
      { owners: arrayRemove(currentUser.uid) }, { merge: true });
    await renderShareList();
    showToast('공유가 취소됐어요');
  } catch(e) { showToast('취소 실패: ' + e.message); }
};

async function loadNotes() {
  setLoading(true);
  await resolveOwner();
  try {
    const q = query(userCol(), orderBy('date', 'desc'));
    const snap = await getDocs(q);
    notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!notes.length) notes = [];
    renderCats(); renderList(); renderEditor();
  } catch(e) { showToast('불러오기 실패: ' + e.message); }
  setLoading(false);
}

async function persistNote(note) {
  if (!currentUser) return;
  const uid = window._forcedOwnerUid || ownerUid();
  try {
    await setDoc(doc(collection(db, 'users', uid, 'notes'), String(note.id)), {
      title: note.title || '',
      body:  note.body  || '',
      cat:   note.cat   || 'memo',
      date:  note.date  || new Date().toISOString().slice(0,10),
    });
  } catch(e) { showToast('저장 실패: ' + e.message); throw e; }
}

async function removeNote(id) {
  if (!currentUser) return;
  const uid = window._forcedOwnerUid || ownerUid();
  try { await deleteDoc(doc(collection(db, 'users', uid, 'notes'), String(id))); }
  catch(e) { showToast('삭제 실패: ' + e.message); }
}

/* ── Helpers ── */
function plainText(html) {
  const d = document.createElement('div'); d.innerHTML = html; return d.textContent || '';
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function getFiltered() {
  return activeCat === 'all' ? [...notes] : notes.filter(n => n.cat === activeCat);
}

/* ── Dirty state ── */
function markDirty() {
  if (!activeNote) return;
  isDirty = true;
  const badge = document.getElementById('unsavedBadge');
  const btn   = document.getElementById('saveBtn');
  if (badge) badge.classList.add('show');
  if (btn)   btn.disabled = false;
  renderList();
}
function markClean() {
  isDirty = false;
  const badge = document.getElementById('unsavedBadge');
  const btn   = document.getElementById('saveBtn');
  const ok    = document.getElementById('saveOk');
  if (badge) badge.classList.remove('show');
  if (btn)   btn.disabled = true;
  if (ok) { ok.classList.add('show'); setTimeout(() => ok.classList.remove('show'), 2000); }
  renderList();
}

/* ── Save ── */
window.saveNote = async () => {
  if (!activeNote || !currentUser) return;
  const titleEl = document.getElementById('titleInput');
  const bodyEl  = document.getElementById('editorContent');
  if (titleEl) activeNote.title = titleEl.value;
  if (bodyEl)  activeNote.body  = bodyEl.innerHTML;
  activeNote.date = new Date().toISOString().slice(0,10);
  const btn = document.getElementById('saveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
  try {
    await persistNote(activeNote);
    markClean();
    renderCats(); renderList();
    showToast('✓ Firebase에 저장됐어요');
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '저장'; }
  }
};

/* ── Render ── */
function renderCats() {
  document.getElementById('catList').innerHTML = CATS.map(c => {
    const count = c.id==='all' ? notes.length : notes.filter(n=>n.cat===c.id).length;
    return `<div class="cat-item${activeCat===c.id?' active':''}" onclick="selectCat('${c.id}')">
      <div class="cat-dot" style="background:${c.color}"></div>
      <span>${c.label}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join('');
}

function renderList() {
  document.getElementById('listTitle').textContent = CATS.find(c=>c.id===activeCat)?.label||'전체';
  const el = document.getElementById('noteItems');
  const filtered = getFiltered();
  if (!filtered.length) {
    el.innerHTML = `<div style="padding:24px 14px;text-align:center;font-size:12px;color:#b0aea8;font-family:'Helvetica Neue',sans-serif">노트가 없습니다</div>`;
    return;
  }
  el.innerHTML = filtered.map(n => {
    const unsaved = isDirty && activeNote?.id === n.id;
    return `<div class="note-card${activeNote?.id===n.id?' active':''} ${unsaved?'unsaved':''}" onclick="trySelectNote('${n.id}')">
      <div class="unsaved-dot"></div>
      <div class="note-card-title">${n.title||'제목 없음'}</div>
      <div class="note-card-preview">${plainText(n.body||'').slice(0,40)||'내용 없음'}</div>
      <div class="note-card-date">${fmtDate(n.date)}</div>
    </div>`;
  }).join('');
}

function buildFmtBar() {
  const swatches = COLORS.map((c,i) =>
    `<div class="color-swatch${i===0?' selected':''}" style="background:${c}" onclick="applyColor('${c}',this)"></div>`
  ).join('');
  const sizeOpts = SIZES.map(s=>`<option value="${s.v}"${s.v==='14px'?' selected':''}>${s.l}</option>`).join('');
  const fontOpts = FONTS.map((f,i)=>`<option value="${f.v}"${i===0?' selected':''}>${f.l}</option>`).join('');
  return `<div class="fmt-bar">
    <div class="fmt-group">
      <button class="fmt-btn" id="btnB" onclick="execFmt('bold')" style="font-weight:700" title="굵게">B</button>
      <button class="fmt-btn" id="btnI" onclick="execFmt('italic')" style="font-style:italic" title="기울임">I</button>
      <button class="fmt-btn" id="btnU" onclick="execFmt('underline')" style="text-decoration:underline" title="밑줄">U</button>
      <button class="fmt-btn" id="btnS" onclick="execFmt('strikeThrough')" style="text-decoration:line-through" title="취소선">S</button>
    </div>
    <div class="fmt-sep"></div>
    <select class="size-select" onchange="applySize(this.value)">${sizeOpts}</select>
    <div class="fmt-sep"></div>
    <select class="font-select" onchange="applyFont(this.value)">${fontOpts}</select>
    <div class="fmt-sep"></div>
    <span class="color-label" style="white-space:nowrap">기본크기</span>
    <select class="size-select" id="baseSizeSelect" onchange="applyBaseSize(this.value)" title="에디터 기본 글씨 크기">
      <option value="12px">12</option>
      <option value="13px">13</option>
      <option value="14px" selected>14</option>
      <option value="15px">15</option>
      <option value="16px">16</option>
      <option value="18px">18</option>
      <option value="20px">20</option>
      <option value="22px">22</option>
    </select>
    <div class="fmt-sep"></div>
    <span class="color-label">색상</span>
    <div class="fmt-group" style="gap:3px">${swatches}</div>
    <div class="color-picker-wrap" title="직접 선택">
      <div class="custom-swatch" id="customSwatch" style="background:${customColor}"></div>
      <input type="color" id="customColorInput" value="${customColor}" onchange="applyCustomColor(this.value)">
    </div>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="execFmt('removeFormat')" style="font-size:10px" title="서식 제거">지우기</button>
  </div>`;
}

function renderEditor() {
  const ea = document.getElementById('editorArea');
  const loginScreen = document.getElementById('loginScreen');

  if (!currentUser) {
    ea.innerHTML = '';
    ea.appendChild(loginScreen);
    loginScreen.style.display = 'flex';
    return;
  }
  if (!activeNote) {
    ea.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">노트를 선택하거나 새로 만들어보세요</div></div>`;
    return;
  }
  const catOpts = CATS.filter(c=>c.id!=='all').map(c =>
    `<option value="${c.id}"${activeNote.cat===c.id?' selected':''}>${c.label}</option>`
  ).join('');
  ea.innerHTML = `
    <div class="editor-top">
      <input class="title-input" id="titleInput" placeholder="제목" value="${(activeNote.title||'').replace(/"/g,'&quot;')}" oninput="markDirty()">
      <select class="cat-select" onchange="updateCat(this.value)">${catOpts}</select>
      <button class="delete-btn" onclick="deleteNote()">삭제</button>
    </div>
    ${buildFmtBar()}
    <div class="editor-body">
      <div class="editor-content" id="editorContent" contenteditable="true" data-placeholder="내용을 입력하세요...">${activeNote.body||''}</div>
    </div>
    <div class="status-bar">
      <div class="status-left">
        <span class="char-count" id="charCount">${plainText(activeNote.body||'').replace(/\s/g,'').length}자</span>
        <span class="unsaved-badge" id="unsavedBadge">저장 안 됨</span>
        <span class="save-ok" id="saveOk">✓ 저장됨</span>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveNote()" disabled>저장</button>
    </div>`;

  const content = document.getElementById('editorContent');
  content.addEventListener('input', () => {
    const cc = document.getElementById('charCount');
    if (cc) cc.textContent = plainText(content.innerHTML).replace(/\s/g,'').length + '자';
    markDirty();
  });
  content.addEventListener('keyup', updateFmtState);
  content.addEventListener('mouseup', updateFmtState);
  content.addEventListener('keydown', e => {
    if (e.key === 'Enter') { document.execCommand('insertLineBreak'); e.preventDefault(); }
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); if (isDirty) saveNote(); }
  });
}

/* ── Format ── */
window.execFmt = (cmd) => { document.getElementById('editorContent')?.focus(); document.execCommand(cmd,false,null); updateFmtState(); markDirty(); };
window.applyFont = (font) => {
  const el = document.getElementById('editorContent');
  if (!el) return;
  el.focus();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) {
    // Apply to whole editor if nothing selected
    el.style.fontFamily = font;
  } else {
    document.execCommand('fontName', false, font);
  }
  markDirty();
};

window.applyBaseSize = (size) => {
  const el = document.getElementById('editorContent');
  if (!el) return;
  el.style.fontSize = size;
  markDirty();
};

window.applySize = (size) => {
  const el = document.getElementById('editorContent'); if (!el) return; el.focus();
  const sel = window.getSelection(); if (!sel||sel.isCollapsed) return;
  document.execCommand('fontSize',false,'7');
  el.querySelectorAll('font[size="7"]').forEach(f=>{f.removeAttribute('size');f.style.fontSize=size;});
  markDirty();
};
window.applyColor = (hex, el) => {
  document.getElementById('editorContent')?.focus();
  document.execCommand('foreColor',false,hex);
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  if (el) el.classList.add('selected'); markDirty();
};
window.applyCustomColor = (hex) => {
  customColor = hex;
  const cs = document.getElementById('customSwatch'); if(cs) cs.style.background=hex;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  applyColor(hex,null);
};
function updateFmtState() {
  [['bold','btnB'],['italic','btnI'],['underline','btnU'],['strikeThrough','btnS']].forEach(([cmd,id])=>{
    const btn=document.getElementById(id); if(btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

/* ── Navigation ── */
window.trySelectNote = (id) => {
  if (isDirty && activeNote?.id !== id) {
    if (!confirm('저장하지 않은 내용이 있습니다.\n저장하지 않고 이동할까요?')) return;
    isDirty = false;
  }
  activeNote = notes.find(n => n.id === id);
  isDirty = false; renderList(); renderEditor();
};
window.selectCat = (id) => {
  if (isDirty) { if (!confirm('저장하지 않은 내용이 있습니다.\n이동할까요?')) return; isDirty=false; }
  activeCat=id; activeNote=null; renderCats(); renderList(); renderEditor();
};
window.updateCat = (v) => { if (!activeNote) return; activeNote.cat=v; markDirty(); renderCats(); };

window.addNote = () => {
  if (!currentUser) { showToast('먼저 로그인해주세요'); return; }
  if (isDirty) { if (!confirm('저장하지 않은 내용이 있습니다. 새 노트를 만들까요?')) return; isDirty=false; }
  const cat = activeCat==='all'?'memo':activeCat;
  const n = { id: String(Date.now()), cat, title:'', body:'', date: new Date().toISOString().slice(0,10) };
  notes.unshift(n); activeNote=n; isDirty=false;
  renderCats(); renderList(); renderEditor();
  setTimeout(()=>document.getElementById('titleInput')?.focus(),50);
};

window.deleteNote = async () => {
  if (!activeNote||!confirm('이 노트를 삭제할까요?')) return;
  setLoading(true);
  await removeNote(activeNote.id);
  notes = notes.filter(n=>n.id!==activeNote.id);
  activeNote=null; isDirty=false;
  setLoading(false);
  renderCats(); renderList(); renderEditor();
  showToast('삭제됐어요');
};

renderCats(); renderList();
</script>
</body>
</html>
