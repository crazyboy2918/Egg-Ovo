<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egg Ovo — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#1A3C34;--green-mid:#2D6B5E;--egg:#F5C842;--ink:#0F1F1C;--muted:#6B8C85;--border:#C8DDD9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--green);height:100vh;overflow:hidden;}
#eo-lock{position:fixed;inset:0;z-index:9999;background:var(--green);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;}
.eo-lock-logo{height:72px;width:auto;object-fit:contain;}
.eo-tagline{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.18em;text-transform:uppercase;font-family:'DM Mono',monospace;}
.eo-box{background:#fff;border-radius:18px;padding:32px 36px;width:340px;box-shadow:0 32px 80px rgba(0,0,0,.4);}
.eo-label{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500;}
.eo-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s;}
.eo-input:focus{border-color:var(--green-mid);}
.eo-btn{width:100%;margin-top:14px;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;}
.eo-btn:hover{background:var(--green-mid);}
.eo-err{color:#C0392B;font-size:13px;margin-top:8px;display:none;text-align:center;}
.eo-hint{font-size:11px;color:rgba(255,255,255,.25);font-family:'DM Mono',monospace;}
#eo-hub{display:none;position:fixed;inset:0;background:var(--green);flex-direction:column;align-items:center;justify-content:center;gap:48px;}
.eo-hub-logo{height:80px;width:auto;object-fit:contain;}
.eo-hub-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.2em;text-transform:uppercase;font-family:'DM Mono',monospace;}
.eo-cards{display:flex;gap:20px;}
.eo-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:34px 30px;width:210px;text-align:center;cursor:pointer;transition:all .22s;}
.eo-card:hover{background:rgba(255,255,255,.12);border-color:var(--egg);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.3);}
.eo-icon{font-size:44px;margin-bottom:16px;display:block;}
.eo-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:6px;}
.eo-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.6;}
.eo-badge{display:inline-block;margin-top:14px;padding:4px 12px;background:var(--egg);color:var(--green);border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
#eo-app{display:none;position:fixed;inset:0;}
#eo-app iframe{width:100%;height:100%;border:none;display:block;}
@keyframes eoFade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.eo-fade{animation:eoFade .25s ease;}
</style>
</head>

  };

  var blobUrls = {};
  Object.keys(APPS).forEach(function(k) {
    blobUrls[k] = URL.createObjectURL(b64toBlob(APPS[k]));
  });

  function showHub() {
    document.getElementById('eo-app').style.display = 'none';
    document.getElementById('eo-frame').src = 'about:blank';
    var hub = document.getElementById('eo-hub');
    hub.style.display = 'flex';
    hub.classList.add('eo-fade');
    setTimeout(function() { hub.classList.remove('eo-fade'); }, 400);
  }

  // 전역으로 노출 — iframe에서 window.parent.__goHub() 호출 가능
  window.__goHub = showHub;

  // iframe에서 postMessage('goHub') 받으면 메뉴로 돌아감
  window.addEventListener('message', function(e) {
    if (e.data === 'goHub') showHub();
  });

  function openApp(name) {
    document.getElementById('eo-hub').style.display = 'none';
    var frame = document.getElementById('eo-frame');
    // onload보다 먼저 __goHub 주입 시도
    frame.onload = function() {
      try { frame.contentWindow.__goHub = showHub; } catch(e) {}
    };
    frame.src = blobUrls[name];
    document.getElementById('eo-app').style.display = 'block';
  }

  function checkPw() {
    var val = document.getElementById('eo-pw-input').value;
    var err = document.getElementById('eo-pw-err');
    if (val === PW) {
      sessionStorage.setItem(SK, '1');
      document.getElementById('eo-lock').style.display = 'none';
      showHub();
    } else {
      err.style.display = 'block';
      document.getElementById('eo-pw-input').value = '';
      setTimeout(function() { err.style.display = 'none'; }, 2000);
    }
  }

  document.getElementById('eo-pw-btn').addEventListener('click', checkPw);
  document.getElementById('eo-pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPw();
  });
  document.getElementById('eo-btn-manager').addEventListener('click', function() { openApp('manager'); });
  document.getElementById('eo-btn-payroll').addEventListener('click', function() { openApp('payroll'); });

  if (sessionStorage.getItem(SK) === '1') {
    document.getElementById('eo-lock').style.display = 'none';
    showHub();
  }
})();
</script>
